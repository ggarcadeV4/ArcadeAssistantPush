<!DOCTYPE html>
<html>
<head>
    <title>Hotkey WebSocket Test</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
        }
        #log {
            border: 2px solid #0f0;
            padding: 10px;
            margin-top: 20px;
            min-height: 300px;
            overflow-y: auto;
        }
        .timestamp {
            color: #666;
        }
        .status { color: #ff0; }
        .message { color: #0ff; }
        .error { color: #f00; }
    </style>
</head>
<body>
    <h1>Hotkey WebSocket Connection Test</h1>
    <p>This page tests the WebSocket connection to the hotkey bridge.</p>
    <p><strong>Instructions:</strong> After the connection opens, press the <kbd>A</kbd> key on your keyboard 3 times.</p>

    <div id="log"></div>

    <script>
        const logDiv = document.getElementById('log');

        function addLog(message, className = '') {
            const timestamp = new Date().toISOString();
            const entry = document.createElement('div');
            entry.className = className;
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        addLog('Initializing WebSocket connection...', 'status');

        const ws = new WebSocket('ws://localhost:8787/ws/hotkey');

        ws.onopen = () => {
            addLog('✅ WS OPEN - Connection established!', 'status');
        };

        ws.onmessage = (event) => {
            addLog(`📨 WS MSG: ${event.data}`, 'message');

            try {
                const data = JSON.parse(event.data);
                if (data.type === 'hotkey_pressed') {
                    addLog(`🎯 HOTKEY DETECTED: Key "${data.key}" pressed!`, 'status');
                }
            } catch (e) {
                // Non-JSON message
            }
        };

        ws.onerror = (error) => {
            addLog('❌ WS ERROR: ' + error, 'error');
        };

        ws.onclose = (event) => {
            addLog(`🔌 WS CLOSE: Code ${event.code}`, 'error');
        };

        // Log when A key is pressed locally (for comparison)
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a') {
                addLog(`⌨️ Local A key detected in browser`, 'status');
            }
        });
    </script>
</body>
</html>
