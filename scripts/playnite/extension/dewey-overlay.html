<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dewey - Arcade Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-card: rgba(15, 23, 42, 0.85);
            --bg-input: rgba(30, 41, 59, 0.7);
            --accent-cyan: #06b6d4;
            --accent-cyan-glow: rgba(6, 182, 212, 0.3);
            --accent-purple: #8b5cf6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.12);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Animated background --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.04) 0%, transparent 50%);
            z-index: 0;
            animation: ambientPulse 8s ease-in-out infinite alternate;
        }

        @keyframes ambientPulse {
            0% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        /* --- Header --- */
        .header {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(20px);
            -webkit-app-region: drag;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px var(--accent-cyan-glow);
            flex-shrink: 0;
            animation: avatarGlow 3s ease-in-out infinite alternate;
        }

        @keyframes avatarGlow {
            0% {
                box-shadow: 0 0 15px var(--accent-cyan-glow);
            }

            100% {
                box-shadow: 0 0 30px var(--accent-cyan-glow), 0 0 60px rgba(6, 182, 212, 0.1);
            }
        }

        .header-text h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header-text .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            margin-left: auto;
            animation: statusPulse 2s ease-in-out infinite;
        }

        .status-dot.offline {
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        @keyframes statusPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .close-btn {
            -webkit-app-region: no-drag;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* --- Chat Area --- */
        .chat-area {
            position: relative;
            z-index: 1;
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.2));
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.assistant .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .message.system {
            align-self: center;
            background: none;
            color: var(--text-muted);
            font-size: 12px;
            font-style: italic;
            padding: 8px 0;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: none;
        }

        .typing-indicator.visible {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-cyan);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* --- Input Area --- */
        .input-area {
            position: relative;
            z-index: 1;
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(20px);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px var(--accent-cyan-glow);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-cyan-glow);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .hint kbd {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
        }

        /* Welcome card */
        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome h2 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .quick-action {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .quick-action:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.08);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="avatar">🤖</div>
        <div class="header-text">
            <h1>Dewey</h1>
            <div class="subtitle">Arcade Assistant AI Concierge</div>
        </div>
        <div class="status-dot" id="statusDot" title="Backend status"></div>
        <button class="close-btn" onclick="window.close()" title="Close (F9)">✕</button>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="emoji">🕹️</div>
            <h2>Hey there, Player!</h2>
            <p>I'm Dewey, your arcade concierge. Ask me anything about your games, or let me route you to the right
                specialist.</p>
            <div class="quick-actions">
                <button class="quick-action" onclick="sendQuick('What games do I have?')">🎮 My Games</button>
                <button class="quick-action" onclick="sendQuick('Recommend me a game')">🎲 Recommend</button>
                <button class="quick-action" onclick="sendQuick('What is this cabinet?')">🏗️ About Cabinet</button>
                <button class="quick-action" onclick="sendQuick('Help me with controls')">🎯 Controls</button>
            </div>
        </div>
        <div class="typing-indicator" id="typing">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Ask Dewey anything..." autofocus
                onkeydown="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="hint">Press <kbd>Enter</kbd> to send &middot; <kbd>F9</kbd> to dismiss</div>
    </div>

    <script>
        const BACKEND = 'http://localhost:8000';
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');
        const statusDot = document.getElementById('statusDot');
        const welcome = document.getElementById('welcome');
        let history = [];

        // Check backend health
        async function checkHealth() {
            try {
                const r = await fetch(`${BACKEND}/health`, { signal: AbortSignal.timeout(2000) });
                statusDot.classList.toggle('offline', !r.ok);
                statusDot.title = r.ok ? 'Backend connected' : 'Backend error';
            } catch {
                statusDot.classList.add('offline');
                statusDot.title = 'Backend offline';
            }
        }
        checkHealth();
        setInterval(checkHealth, 15000);

        function addMessage(role, text) {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'assistant') {
                div.innerHTML = `<div class="label">Dewey</div>${escapeHtml(text)}`;
            } else {
                div.textContent = text;
            }
            chatArea.insertBefore(div, typing);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(t) {
            return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            msgInput.value = '';
            addMessage('user', text);
            history.push({ role: 'user', content: text });

            typing.classList.add('visible');
            sendBtn.disabled = true;

            try {
                // Try the Dewey chat endpoint first
                const r = await fetch(`${BACKEND}/api/local/dewey/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: history.slice(-10) }),
                    signal: AbortSignal.timeout(30000)
                });

                if (r.ok) {
                    const data = await r.json();
                    const reply = data.reply || data.response || data.message || JSON.stringify(data);
                    addMessage('assistant', reply);
                    history.push({ role: 'assistant', content: reply });
                } else {
                    // Fallback: try generic AI chat
                    const r2 = await fetch(`${BACKEND}/api/ai/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text, agentId: 'dewey', context: {} }),
                        signal: AbortSignal.timeout(30000)
                    });
                    if (r2.ok) {
                        const data = await r2.json();
                        const reply = data.reply || data.response || JSON.stringify(data);
                        addMessage('assistant', reply);
                        history.push({ role: 'assistant', content: reply });
                    } else {
                        addMessage('system', `Backend returned ${r.status}. Is the Arcade Assistant backend running?`);
                    }
                }
            } catch (err) {
                addMessage('system', `Connection error: ${err.message}. Start the backend with: python -m backend.app`);
            } finally {
                typing.classList.remove('visible');
                sendBtn.disabled = false;
                msgInput.focus();
            }
        }

        function sendQuick(text) {
            msgInput.value = text;
            sendMessage();
        }

        // F9 / ESC to close
        document.addEventListener('keydown', e => {
            if (e.key === 'F9' || e.key === 'Escape') {
                window.close();
            }
        });

        // Focus input on window focus
        window.addEventListener('focus', () => msgInput.focus());
    </script>
</body>

</html>
