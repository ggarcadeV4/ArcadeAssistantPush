name: Plan Gate
on: [pull_request]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate plan & evidence
        run: |
          python - <<'PY'
          import yaml, json, pathlib, sys
          por = yaml.safe_load(open("plan/por.yaml", "r", encoding="utf8"))
          failures = []
          for phase in por.get("phases", []):
            for t in phase.get("tasks", []):
              status = t.get("status","todo")
              if status in ("done","verified"):
                ev = t.get("evidence")
                if not ev or not pathlib.Path(ev).exists():
                  failures.append(f"{t['id']}: missing evidence file {ev}")
                  continue
                lines = [x for x in open(ev, "r", encoding="utf8").read().splitlines() if x.strip()]
                if not lines:
                  failures.append(f"{t['id']}: evidence file empty")
                  continue
                latest = json.loads(lines[-1])
                if latest.get("task_id") != t["id"]:
                  failures.append(f"{t['id']}: latest evidence task_id mismatch")
                if not latest.get("checks_passed", False):
                  failures.append(f"{t['id']}: latest evidence checks_passed=false")
                if status == "verified" and not t.get("last_verified_sha"):
                  failures.append(f"{t['id']}: verified without last_verified_sha")
          if failures:
            print("Plan gate failures:")
            for f in failures: print(" -", f)
            sys.exit(1)
          print("Plan gate: OK")
          PY
